name: CI Kanban API

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_e_testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código fonte
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verificar estrutura
        run: |
          pwd
          ls -la
          find . -name pom.xml

      - name: Compilar e testar com Maven
        run: mvn clean package -f ./lab/pom.xml